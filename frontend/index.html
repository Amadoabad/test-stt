<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STT Evaluator — Arabic</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 24px;
    }
    h1 { font-size: 22px; font-weight: 500; color: #fff; text-align: center; }

    /* ── Card ── */
    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 640px;
    }

    /* ── Config bar ── */
    .config-row { display: flex; gap: 8px; align-items: center; }
    .config-row label { font-size: 13px; color: #888; white-space: nowrap; }
    .config-row input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      padding: 6px 10px;
      font-size: 13px;
    }

    /* ── Controls ── */
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    select {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 10px 12px;
      font-size: 15px;
    }
    #record-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #record-btn.idle    { background: #c0392b; }
    #record-btn.recording { background: #e74c3c; animation: pulse 1s infinite; }
    #record-btn.processing { background: #555; cursor: default; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .mic-icon { width: 22px; height: 22px; fill: #fff; }
    .stop-icon { width: 18px; height: 18px; fill: #fff; }

    /* ── Status / result ── */
    .status-text { font-size: 13px; color: #666; min-height: 18px; }
    .result-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.7;
      min-height: 80px;
      text-align: right;
      direction: rtl;
      color: #f0f0f0;
      white-space: pre-wrap;
    }
    .result-meta {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #555; margin-top: 6px;
    }

    /* ── History ── */
    .history-header {
      font-size: 13px; font-weight: 500; color: #666;
      margin-bottom: 10px; display: flex; justify-content: space-between;
    }
    .history-item {
      border-bottom: 1px solid #222;
      padding: 10px 0;
      font-size: 14px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-text { text-align: right; direction: rtl; color: #ccc; margin-bottom: 4px; }
    .history-item .h-meta { font-size: 11px; color: #555; display: flex; justify-content: space-between; }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Util ── */
    .section-title { font-size: 13px; color: #555; font-weight: 500; margin-bottom: 12px; }
    .gap { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>

<h1>STT Evaluator — Arabic (Saudi)</h1>

<!-- Config -->
<div class="card">
  <div class="config-row">
    <label>Backend URL</label>
    <input id="backend-url" type="text" value="http://localhost:8000" placeholder="http://<vast-ip>:<port>">
  </div>
  <div id="connection-status" style="font-size:12px;color:#555;margin-top:6px;text-align:left"></div>
</div>

<!-- Main -->
<div class="card gap">
  <p class="section-title">Select model & record</p>
  <div class="controls">
    <select id="model-select">
      <option value="">Loading models…</option>
    </select>
    <button id="record-btn" class="idle" title="Record">
      <!-- Mic SVG -->
      <svg class="mic-icon" id="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm6 9a6 6 0 0 1-12 0H4a8 8 0 0 0 16 0h-2zm-6 9v-2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </div>
  <div class="status-text" id="status">Choose a model and press record.</div>

  <!-- Current result -->
  <div class="result-box" id="result-box" dir="rtl">—</div>
  <div class="result-meta">
    <span id="result-model"></span>
    <span id="result-latency"></span>
  </div>
</div>

<!-- History -->
<div class="card">
  <div class="history-header">
    <span>History</span>
    <span id="clear-history" style="cursor:pointer;color:#444" onclick="clearHistory()">clear</span>
  </div>
  <div id="history-list"><p style="font-size:13px;color:#444">No transcriptions yet.</p></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let recorder = null;
let chunks = [];
let recording = false;
let history = [];

// ── Init ──────────────────────────────────────────────────────
async function init() {
  const url = document.getElementById('backend-url').value.trim();
  try {
    const res = await fetch(`${url}/models`);
    const models = await res.json();
    const sel = document.getElementById('model-select');
    sel.innerHTML = models.map(m =>
      `<option value="${m.key}">${m.name}</option>`
    ).join('');
    setStatus(`${models.length} models available. Press record to start.`);
    // Health check
    const h = await fetch(`${url}/health`);
    const hj = await h.json();
    document.getElementById('connection-status').textContent =
      `Connected · ${hj.gpu ?? 'CPU'} · CUDA: ${hj.cuda}`;
  } catch(e) {
    setStatus('Cannot reach backend. Check URL above.', 'error');
    document.getElementById('connection-status').textContent = 'Not connected';
  }
}

document.getElementById('backend-url').addEventListener('change', init);
document.addEventListener('DOMContentLoaded', init);

// ── Recording ────────────────────────────────────────────────
const btn = document.getElementById('record-btn');
btn.addEventListener('click', async () => {
  if (btn.classList.contains('processing')) return;
  if (!recording) {
    await startRecording();
  } else {
    stopRecording();
  }
});

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = handleRecordingStop;
  recorder.start();
  recording = true;
  btn.className = 'recording';
  setStatus('Recording… click again to stop.');
}

function stopRecording() {
  recorder.stop();
  recorder.stream.getTracks().forEach(t => t.stop());
  recording = false;
  btn.className = 'processing';
  setStatus('Processing…');
}

async function handleRecordingStop() {
  const blob = new Blob(chunks, { type: 'audio/webm' });
  const modelKey = document.getElementById('model-select').value;
  if (!modelKey) {
    setStatus('No model selected.');
    btn.className = 'idle';
    return;
  }
  await transcribe(blob, modelKey);
  btn.className = 'idle';
}

// ── Transcription ────────────────────────────────────────────
async function transcribe(blob, modelKey) {
  const url = document.getElementById('backend-url').value.trim();
  const fd = new FormData();
  fd.append('audio', blob, 'recording.webm');

  setStatus('<span class="spinner"></span> Transcribing…');
  try {
    const res = await fetch(`${url}/transcribe/${modelKey}`, {
      method: 'POST',
      body: fd,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const data = await res.json();
    showResult(data);
    addHistory(data);
    setStatus(`Done · ${data.latency_ms}ms`);
  } catch(e) {
    setStatus(`Error: ${e.message}`, 'error');
    document.getElementById('result-box').textContent = '—';
  }
}

function showResult({ text, model_name, latency_ms }) {
  document.getElementById('result-box').textContent = text || '(empty)';
  document.getElementById('result-model').textContent = model_name;
  document.getElementById('result-latency').textContent = `${latency_ms}ms`;
}

function addHistory({ text, model_name, latency_ms }) {
  history.unshift({ text, model_name, latency_ms, ts: new Date().toLocaleTimeString() });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<p style="font-size:13px;color:#444">No transcriptions yet.</p>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="h-text">${h.text || '(empty)'}</div>
      <div class="h-meta"><span>${h.model_name}</span><span>${h.ts} · ${h.latency_ms}ms</span></div>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  renderHistory();
}

function setStatus(html, type) {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.style.color = type === 'error' ? '#e74c3c' : '#666';
}
</script>
</body>
</html>
