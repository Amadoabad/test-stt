<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STT Evaluator — Arabic</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    /* ── System bar (top) ── */
    .system-bar {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 13px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .system-bar .label { color: #666; }
    .system-bar .value { color: #f0f0f0; font-weight: 500; }
    .system-bar .bar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .progress-bar {
      width: 120px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #4a9eff;
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ── Models grid ── */
    .models-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .models-title {
      font-size: 14px;
      font-weight: 500;
      color: #888;
      padding: 0 4px;
    }
    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    /* ── Model card ── */
    .model-card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .model-card:hover {
      border-color: #3e3e3e;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: #f0f0f0;
      flex: 1;
    }
    .card-size {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #222;
      color: #888;
    }
    .status-badge.loaded {
      background: #1a3a1a;
      color: #4ade80;
    }
    .status-badge.downloaded {
      background: #1a2a3a;
      color: #60a5fa;
    }
    .status-badge.downloading {
      background: #3a2a1a;
      color: #fbbf24;
    }
    .status-badge.error {
      background: #3a1a1a;
      color: #f87171;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .card-progress {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .card-progress.show { display: flex; }
    .progress-bar-large {
      width: 100%;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill-large {
      height: 100%;
      background: #fbbf24;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .progress-text {
      font-size: 11px;
      color: #666;
    }

    .card-error {
      display: none;
      padding: 8px;
      background: #3a1a1a;
      border-radius: 4px;
      font-size: 11px;
      color: #f87171;
      border-left: 2px solid #f87171;
    }
    .card-error.show { display: block; }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled {
      background: #555;
      cursor: default;
      opacity: 0.6;
    }
    .btn-secondary {
      background: #555;
      color: #e8e8e8;
    }
    .btn-secondary:hover { background: #666; }
    .btn-secondary:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-danger:hover { background: #dc2626; }

    /* ── Record section ── */
    .record-section {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .record-section h2 {
      font-size: 14px;
      color: #888;
      font-weight: 500;
    }

    .record-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #record-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #record-btn.idle { background: #c0392b; }
    #record-btn.recording { background: #e74c3c; animation: pulse 1s infinite; }
    #record-btn.processing { background: #555; cursor: default; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .mic-icon { width: 22px; height: 22px; fill: #fff; }
    .stop-icon { width: 18px; height: 18px; fill: #fff; }

    select {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 10px 12px;
      font-size: 14px;
    }

    .status-text { font-size: 13px; color: #666; min-height: 18px; }
    .result-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.7;
      min-height: 80px;
      text-align: right;
      direction: rtl;
      color: #f0f0f0;
      white-space: pre-wrap;
    }
    .result-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }

    /* ── History ── */
    .history-section {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 16px;
    }
    .history-header {
      font-size: 13px;
      font-weight: 500;
      color: #666;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }
    .history-item {
      border-bottom: 1px solid #222;
      padding: 10px 0;
      font-size: 14px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-text { text-align: right; direction: rtl; color: #ccc; margin-bottom: 4px; }
    .history-item .h-meta { font-size: 11px; color: #555; display: flex; justify-content: space-between; }

    /* ── Spinner ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Config ── */
    .config-section {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .config-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      padding: 6px 10px;
      font-size: 12px;
    }
    .config-status { color: #666; }
  </style>
</head>
<body>

<!-- System Bar -->
<div class="system-bar">
  <div class="bar">
    <span class="label">GPU:</span>
    <span class="value" id="gpu-name">—</span>
  </div>
  <div class="bar">
    <span class="label">VRAM:</span>
    <div class="progress-bar">
      <div class="progress-fill" id="vram-fill"></div>
    </div>
    <span class="value" id="vram-text">—</span>
  </div>
  <div class="bar">
    <span class="label">Disk free:</span>
    <span class="value" id="disk-text">—</span>
  </div>
</div>

<!-- Models Grid -->
<div class="models-section">
  <div class="models-title">Model Management</div>
  <div class="models-grid" id="models-grid">
    <p style="color:#666;font-size:13px">Loading models…</p>
  </div>
</div>

<!-- Record Section -->
<div class="record-section">
  <h2>Transcription</h2>
  <div class="record-controls">
    <select id="model-select">
      <option value="">Choose a loaded model…</option>
    </select>
    <button id="record-btn" class="idle" title="Record">
      <svg class="mic-icon" id="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm6 9a6 6 0 0 1-12 0H4a8 8 0 0 0 16 0h-2zm-6 9v-2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </div>
  <div class="status-text" id="status">Choose a loaded model and press record.</div>
  <div class="result-box" id="result-box" dir="rtl">—</div>
  <div class="result-meta">
    <span id="result-model"></span>
    <span id="result-latency"></span>
  </div>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-header">
    <span>History</span>
    <span id="clear-history" style="cursor:pointer;color:#444" onclick="clearHistory()">clear</span>
  </div>
  <div id="history-list"><p style="font-size:13px;color:#444">No transcriptions yet.</p></div>
</div>

<!-- Config -->
<div class="card">
  <div class="config-row">
    <label>Backend URL</label>
    <input id="backend-url" type="text" value="http://localhost:8000" placeholder="http://<vast-ip>:<port>">
  </div>
  <div class="config-row" style="margin-top:8px">
    <label>HF Token</label>
    <input id="hf-token" type="password" placeholder="hf_xxxxxxxxxxxx (for gated models)">
    <button onclick="saveToken()" style="background:#222;border:1px solid #333;color:#ccc;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;white-space:nowrap">Set Token</button>
  </div>
  <div id="connection-status" style="font-size:12px;color:#555;margin-top:6px;text-align:left"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let recorder = null;
let chunks = [];
let recording = false;
let history = [];
let pollInterval = null;
let modelStates = {};

// ── API helpers ──────────────────────────────────────────────────
async function fetchAPI(path) {
  const url = document.getElementById('backend-url').value.trim();
  try {
    const res = await fetch(`${url}${path}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error(`API error: ${path}`, e);
    return null;
  }
}

async function saveToken() {
  const token = document.getElementById('hf-token').value.trim();
  const url = document.getElementById('backend-url').value.trim();
  try {
    await fetch(`${url}/set-token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    document.getElementById('connection-status').textContent =
      token ? 'HF token set ✓' : 'HF token cleared';
  } catch(e) {
    document.getElementById('connection-status').textContent = 'Failed to set token';
  }
}

// ── System info ──────────────────────────────────────────────────
async function refreshSystemInfo() {
  const sys = await fetchAPI('/system');
  if (!sys) return;

  const gpuEl = document.getElementById('gpu-name');
  const vramTextEl = document.getElementById('vram-text');
  const vramFillEl = document.getElementById('vram-fill');
  const diskEl = document.getElementById('disk-text');

  gpuEl.textContent = sys.gpu || 'CPU';
  diskEl.textContent = `${sys.disk_free_gb} GB`;

  if (sys.cuda && sys.vram_total_gb > 0) {
    const pct = (sys.vram_used_gb / sys.vram_total_gb) * 100;
    vramFillEl.style.width = `${pct}%`;
    vramTextEl.textContent = `${sys.vram_used_gb} / ${sys.vram_total_gb} GB`;
  } else {
    vramTextEl.textContent = 'N/A';
  }
}

// ── Model states ─────────────────────────────────────────────────
async function refreshModelStates() {
  const states = await fetchAPI('/model-states');
  if (!states) return;
  
  modelStates = states;
  renderModelCards(states);
  updateTranscriptionDropdown(states);
}

function renderModelCards(states) {
  const grid = document.getElementById('models-grid');
  grid.innerHTML = Object.entries(states)
    .map(([key, state]) => renderModelCard(key, state))
    .join('');

  // Attach event listeners
  Object.entries(states).forEach(([key, state]) => {
    const downloadBtn = document.getElementById(`download-${key}`);
    const loadBtn = document.getElementById(`load-${key}`);
    const unloadBtn = document.getElementById(`unload-${key}`);

    if (downloadBtn) {
      downloadBtn.addEventListener('click', () => downloadModel(key));
    }
    if (loadBtn) {
      loadBtn.addEventListener('click', () => loadModel(key));
    }
    if (unloadBtn) {
      unloadBtn.addEventListener('click', () => unloadModel(key));
    }
  });
}

function renderModelCard(key, state) {
  const modelCfg = window.modelCatalog?.[key] || {};
  const size = state.size_gb ? `[${state.size_gb}GB]` : '';
  let statusBadge = '';
  let actions = '';
  let progress = '';
  let error = '';

  if (state.status === 'loaded') {
    statusBadge = `<div class="status-badge loaded"><span class="status-dot"></span>Loaded</div>`;
    actions = `
      <button class="btn btn-danger" onclick="unloadModel('${key}')">Unload from VRAM</button>
      <button class="btn btn-secondary" style="flex:0" onclick="deleteModel('${key}')">Delete</button>
    `;
  } else if (state.status === 'downloaded') {
    statusBadge = `<div class="status-badge downloaded"><span class="status-dot"></span>Ready (on disk)</div>`;
    actions = `
      <button class="btn btn-primary" onclick="loadModel('${key}')">Load into VRAM</button>
      <button class="btn btn-secondary" style="flex:0" onclick="deleteModel('${key}')">Delete</button>
    `;
  } else if (state.status === 'downloading') {
    statusBadge = `<div class="status-badge downloading"><span class="status-dot"></span>Downloading</div>`;
    progress = `
      <div class="card-progress show">
        <div class="progress-bar-large">
          <div class="progress-fill-large" style="width:${state.progress}%"></div>
        </div>
        <div class="progress-text">${Math.round(state.progress)}% • ${state.size_gb} GB</div>
      </div>
    `;
    actions = `<button class="btn btn-secondary" disabled>Downloading…</button>`;
  } else if (state.status === 'loading') {
    statusBadge = `<div class="status-badge downloading"><span class="status-dot"></span>Loading…</div>`;
    actions = `<button class="btn btn-secondary" disabled>Loading…</button>`;
  } else if (state.status === 'error') {
    statusBadge = `<div class="status-badge error"><span class="status-dot"></span>Error</div>`;
    error = `<div class="card-error show">${state.error || 'Unknown error'}</div>`;
    actions = `<button class="btn btn-primary" onclick="downloadModel('${key}')">Retry Download</button>`;
  } else {
    statusBadge = `<div class="status-badge"><span class="status-dot"></span>Not downloaded</div>`;
    actions = `<button class="btn btn-primary" onclick="downloadModel('${key}')">Download</button>`;
  }

  return `
    <div class="model-card">
      <div class="card-header">
        <div class="card-title">${modelCfg.name || key}</div>
        <div class="card-size">${size}</div>
      </div>
      <div class="card-status">${statusBadge}</div>
      ${progress}
      ${error}
      <div class="card-actions">${actions}</div>
    </div>
  `;
}

async function downloadModel(key) {
  const url = document.getElementById('backend-url').value.trim();
  try {
    const res = await fetch(`${url}/download/${key}`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data) {
      await refreshModelStates();
      startPolling(true);
    }
  } catch (e) {
    console.error(`Download error: ${key}`, e);
  }
}

async function loadModel(key) {
  const url = document.getElementById('backend-url').value.trim();
  try {
    const res = await fetch(`${url}/load/${key}`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data) {
      await refreshModelStates();
      startPolling(true);
    }
  } catch (e) {
    console.error(`Load error: ${key}`, e);
  }
}

async function unloadModel(key) {
  const url = document.getElementById('backend-url').value.trim();
  try {
    const res = await fetch(`${url}/unload/${key}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await refreshModelStates();
  } catch(e) {
    console.error(`Unload error: ${key}`, e);
  }
}

async function deleteModel(key) {
  const url = document.getElementById('backend-url').value.trim();
  if (!confirm(`Delete ${key} from disk? This will require re-downloading.`)) return;
  try {
    const res = await fetch(`${url}/delete/${key}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await refreshModelStates();
  } catch(e) {
    console.error(`Delete error: ${key}`, e);
  }
}

function updateTranscriptionDropdown(states) {
  const sel = document.getElementById('model-select');
  const loaded = Object.entries(states)
    .filter(([_, s]) => s.loaded)
    .map(([k, _]) => k);

  const selected = sel.value;
  sel.innerHTML = loaded.length
    ? loaded.map(k => `<option value="${k}">${window.modelCatalog?.[k]?.name || k}</option>`).join('')
    : `<option value="">No loaded models</option>`;

  if (loaded.includes(selected)) {
    sel.value = selected;
  }
}

// ── Polling ──────────────────────────────────────────────────────
function startPolling(fast = false) {
  stopPolling();
  const interval = fast ? 2000 : 10000;
  pollInterval = setInterval(refreshAll, interval);
}

function stopPolling() {
  if (pollInterval) {
    clearInterval(pollInterval);
    pollInterval = null;
  }
}

async function refreshAll() {
  await refreshSystemInfo();
  await refreshModelStates();

  // Check if any model is in progress
  const busy = Object.values(modelStates).some(s =>
    s.status === 'downloading' || s.status === 'loading'
  );
  if (busy && !pollInterval) {
    startPolling(true);
  } else if (!busy && pollInterval && Number(pollInterval) !== 10000) {
    startPolling(false);
  }
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    // Fetch model catalog
    const models = await fetchAPI('/models');
    if (models) {
      window.modelCatalog = {};
      models.forEach(m => {
        window.modelCatalog[m.key] = m;
      });
    }

    // Health check
    const health = await fetchAPI('/health');
    if (health) {
      document.getElementById('connection-status').textContent = 'Connected';
    }

    // Initial refresh
    await refreshAll();
    startPolling(false);
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('connection-status').textContent = 'Error';
  }
}

document.getElementById('backend-url').addEventListener('change', init);
document.addEventListener('DOMContentLoaded', init);

// ── Recording ────────────────────────────────────────────────
const btn = document.getElementById('record-btn');
btn.addEventListener('click', async () => {
  if (btn.classList.contains('processing')) return;
  if (!recording) {
    await startRecording();
  } else {
    stopRecording();
  }
});

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = handleRecordingStop;
    recorder.start();
    recording = true;
    btn.className = 'recording';
    setStatus('Recording… click again to stop.');
  } catch (e) {
    setStatus(`Microphone error: ${e.message}`, 'error');
  }
}

function stopRecording() {
  recorder.stop();
  recorder.stream.getTracks().forEach(t => t.stop());
  recording = false;
  btn.className = 'processing';
  setStatus('Processing…');
}

async function handleRecordingStop() {
  const blob = new Blob(chunks, { type: 'audio/webm' });
  const modelKey = document.getElementById('model-select').value;
  if (!modelKey) {
    setStatus('No model selected.');
    btn.className = 'idle';
    return;
  }
  await transcribe(blob, modelKey);
  btn.className = 'idle';
}

// ── Transcription ────────────────────────────────────────────
async function transcribe(blob, modelKey) {
  const url = document.getElementById('backend-url').value.trim();
  const fd = new FormData();
  fd.append('audio', blob, 'recording.webm');

  setStatus('<span class="spinner"></span> Transcribing… (large models may take 30–60s)');

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 120_000); // 2 min timeout

  try {
    const res = await fetch(`${url}/transcribe/${modelKey}`, {
      method: 'POST',
      body: fd,
      signal: controller.signal,
    });
    clearTimeout(timeout);
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const data = await res.json();
    showResult(data);
    addHistory(data);
    setStatus(`Done · ${data.latency_ms}ms`);
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') {
      setStatus('Request timed out — model may still be processing. Try a shorter clip.', 'error');
    } else {
      setStatus(`Error: ${e.message}`, 'error');
    }
    document.getElementById('result-box').textContent = '—';
  }
}

function showResult({ text, model_name, latency_ms }) {
  document.getElementById('result-box').textContent = text || '(empty)';
  document.getElementById('result-model').textContent = model_name;
  document.getElementById('result-latency').textContent = `${latency_ms}ms`;
}

function addHistory({ text, model_name, latency_ms }) {
  history.unshift({ text, model_name, latency_ms, ts: new Date().toLocaleTimeString() });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<p style="font-size:13px;color:#444">No transcriptions yet.</p>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="h-text">${h.text || '(empty)'}</div>
      <div class="h-meta"><span>${h.model_name}</span><span>${h.ts} · ${h.latency_ms}ms</span></div>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  renderHistory();
}

function setStatus(text, style = 'normal') {
  const el = document.getElementById('status');
  el.innerHTML = text;
  el.style.color = style === 'error' ? '#f87171' : '#888';
}
</script>
</body>
</html>
